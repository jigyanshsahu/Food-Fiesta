services:
  backend:
    build:
      context: ./backend
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - MONGO_URI=${MONGO_URI:-mongodb+srv://jigyanshsahu:124421@cluster0.4pnnwfh.mongodb.net/?appName=Cluster0}
      - JWT_SECRET=${JWT_SECRET:-your_jwt_secret_key_here}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-your_stripe_key_here}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME:-dq5xgtkqb}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY:-986533229716848}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET:-ROUaYdkaO-ulnHaEYLFOG7YcKUE}
    networks:
      - food-fiesta-network

  frontend:
    build:
      context: ./frontend
      args:
        # Default for local testing; change this for production deployment
        - VITE_BACKEND_URL=http://localhost:4000
    ports:
      - "5173:80"
    depends_on:
      - backend
    networks:
      - food-fiesta-network

  admin:
    build:
      context: ./admin
      args:
        # Default for local testing; change this for production deployment
        - VITE_BACKEND_URL=http://localhost:4000
    ports:
      - "5174:80"
    depends_on:
      - backend
    networks:
      - food-fiesta-network

networks:
  food-fiesta-network:
    driver: bridge
